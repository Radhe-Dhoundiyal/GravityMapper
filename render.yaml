services:
  - type: web
    name: gadv-web-dashboard
    env: node
    plan: free
    buildCommand: |
      mkdir -p dist dist/public
      npm ci
      npx vite build
      npx esbuild app/server/index.ts app/server/routes.ts app/server/storage.ts app/server/vite.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: node render.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
