services:
  - type: web
    name: gadv-web-dashboard
    env: node
    plan: free
    # Build
    # 1. Install all deps, including devDependencies, because vite and esbuild
    #    are required by the package build script.
    # 2. Run the package build script. It builds the React client into
    #    dist/public and bundles app/server/index.ts into dist/index.js.
    buildCommand: |
      npm ci --include=dev
      npm run build
    # Start
    # Single Node process serves /api/*, /ws, and the built frontend from
    # dist/public. The package start script runs dist/index.js and binds to
    # $PORT via app/server/index.ts.
    startCommand: npm run start
    # Health
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # SESSION_SECRET is reserved for future cookie/session support.
      - key: SESSION_SECRET
        generateValue: true
